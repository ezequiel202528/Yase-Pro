<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YaSe PRO - Gestão de OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(10px); }
        .os-table th { text-transform: uppercase; font-size: 10px; font-weight: 900; letter-spacing: 0.05em; padding: 12px; color: #94a3b8; border-bottom: 2px solid #1e293b; }
        .os-table td { padding: 12px; font-size: 11px; border-bottom: 1px solid rgba(51, 65, 85, 0.3); }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .status-aberta { background: rgba(79, 70, 229, 0.2); color: #818cf8; border: 1px solid rgba(79, 70, 229, 0.3); }
        .status-encerrada { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
    </style>
  </head>
  <body>

    <div class="flex h-screen overflow-hidden">
      <aside class="w-64 p-5 flex flex-col h-full bg-[#0b1120] border-r border-slate-800">
        <div class="mb-8 flex items-center gap-3">
          <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center shadow-lg shadow-amber-500/20">
            <i class="fa-solid fa-fire-extinguisher text-xl text-slate-900"></i>
          </div>
          <h1 class="text-xl font-extrabold tracking-tight">YaSe <span class="text-amber-500">PRO</span></h1>
        </div>
        <nav class="space-y-4 flex-1">
          <a href="#" class="flex items-center gap-3 p-3 rounded-xl bg-slate-800/40 text-amber-500 font-bold text-xs border border-slate-700/50">
            <i class="fa-solid fa-folder-open"></i> Gerenciar OS
          </a>
        </nav>
      </aside>

      <main class="flex-1 flex flex-col overflow-hidden bg-slate-950">
        <header class="p-6 flex justify-between items-center border-b border-slate-800">
          <div>
            <h2 class="text-xl font-black text-white uppercase tracking-tighter">Central de <span class="text-amber-500">Ordens de Serviço</span></h2>
            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">Sincronizado com Supabase</p>
          </div>
          <button onclick="abrirModalOS()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-black text-[11px] uppercase transition-all flex items-center gap-2">
            <i class="fa-solid fa-plus-circle"></i> Nova OS
          </button>
        </header>

        <div class="px-6 py-4 flex gap-4">
            <div class="flex-[3] glass-card p-2 rounded-xl flex items-center gap-3 border-slate-700">
                <i class="fa-solid fa-magnifying-glass text-slate-500 text-xs ml-2"></i>
                <input type="text" id="filtroBusca" onkeyup="filtrarTabela()" placeholder="BUSCAR OS..." class="bg-transparent border-none outline-none text-[10px] font-bold text-white w-full uppercase">
            </div>
            <select id="filtroStatus" onchange="filtrarTabela()" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 text-[10px] font-black text-slate-400 uppercase outline-none">
                <option value="TODOS">Todos os Status</option>
                <option value="ABERTA">Abertas</option>
                <option value="ENCERRADA">Encerradas</option>
            </select>
        </div>

        <div class="flex-1 px-6 pb-6 overflow-hidden">
          <div class="h-full glass-card rounded-2xl overflow-hidden flex flex-col border border-slate-800">
            <div class="overflow-y-auto">
              <table class="w-full text-left os-table">
                <thead class="sticky top-0 bg-slate-900 z-10">
                  <tr>
                    <th>Nº da OS</th>
                    <th>Mês Ref.</th>
                    <th>Abertura</th>
                    <th>Encerramento</th>
                    <th>Status</th>
                    <th class="text-right pr-6">Ações</th>
                  </tr>
                </thead>
                <tbody id="osList">
                    </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div id="modalOS" class="fixed inset-0 z-[10000] hidden items-center justify-center bg-slate-950/90 backdrop-blur-md p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-[2rem] shadow-2xl overflow-hidden">
            <div class="p-8 text-center">
                <h3 id="modalTitle" class="text-lg font-black text-white uppercase mb-6">Nova OS</h3>
                <input type="hidden" id="editId">
                <input type="text" id="num_os_input" placeholder="NÚMERO DA OS" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none font-bold uppercase">
            </div>
            <div class="p-6 bg-slate-800/30 flex gap-3">
                <button onclick="fecharModalOS()" class="flex-1 py-3 text-[10px] font-black uppercase text-slate-500">Cancelar</button>
                <button onclick="processarOS()" class="flex-[2] bg-amber-500 text-slate-900 py-3 rounded-xl text-[10px] font-black uppercase">Confirmar</button>
            </div>
        </div>
    </div>
    <div id="modalSeguranca" class="fixed inset-0 z-[11000] hidden items-center justify-center bg-slate-950/95 backdrop-blur-xl p-4">
    <div class="bg-slate-900 border border-slate-700 w-full max-w-xs rounded-[2.5rem] shadow-2xl overflow-hidden p-8 text-center">
        <div class="w-16 h-16 bg-amber-500/10 text-amber-500 rounded-full flex items-center justify-center text-2xl mx-auto mb-4 border border-amber-500/20">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h3 id="tituloSeguranca" class="text-white font-black uppercase text-sm mb-2">Autorização Requerida</h3>
        <p class="text-slate-500 text-[10px] font-bold uppercase mb-6 tracking-tighter">Insira a senha de supervisor para prosseguir</p>
        
        <input type="password" id="senha_admin" placeholder="••••••••" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 text-center text-white focus:ring-2 ring-amber-500 outline-none mb-4 font-black tracking-[0.5em]">
        
        <div class="flex flex-col gap-2">
            <button onclick="validarAcaoSeguranca()" class="w-full bg-amber-500 text-slate-900 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-amber-500/20">Confirmar</button>
            <button onclick="fecharModalSeguranca()" class="w-full py-2 text-[9px] font-black uppercase text-slate-500 hover:text-white transition-colors">Cancelar</button>
        </div>
    </div>
</div>

    <script>
// Use um nome ligeiramente diferente para evitar conflito com a biblioteca global
const SUPABASE_URL = 'https://gzojpxgpgjapsegerscb.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6b2pweGdwZ2phcHNlZ2Vyc2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4Nzc2MzUsImV4cCI6MjA4NTQ1MzYzNX0.vSaIuKyEuzNEGxFsawugLwtUpwWqYpCMP_a3JfWrY5s'; 
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function carregarOS() {
    const { data, error } = await _supabase
        .from('ordens_servico')
        .select('*')
        .order('criado_em', { ascending: false });

    if (error) {
        console.error('Erro ao carregar:', error);
        return;
    }
    renderizarTabela(data);
}

function renderizarTabela(dados) {
    const tbody = document.getElementById('osList');
    if (!tbody) return;
    
    // Limpa a tabela antes de renderizar para evitar duplicidade
    tbody.innerHTML = '';

    if (dados.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" class="text-center py-10 text-slate-500 font-bold uppercase text-[10px] tracking-widest">
                    Nenhuma Ordem de Serviço encontrada
                </td>
            </tr>`;
        return;
    }

    tbody.innerHTML = dados.map(os => {
        // Formatação das datas para o padrão brasileiro
        const dataAbertura = new Date(os.data_abertura).toLocaleString('pt-BR');
        const dataEncerramento = os.data_encerramento 
            ? new Date(os.data_encerramento).toLocaleString('pt-BR') 
            : '---';

        return `
            <tr class="hover:bg-slate-800/30 transition-colors border-b border-slate-800/50">
                <td class="font-black text-white tracking-wider">#${os.numero_os}</td>
                <td class="text-amber-500 font-bold uppercase">${os.mes_referencia}</td>
                <td class="text-slate-400 text-[10px]">${dataAbertura}</td>
                <td class="text-slate-500 font-medium text-[10px]">${dataEncerramento}</td>
                <td>
                    <span class="status-badge ${os.status === 'ABERTA' ? 'status-aberta' : 'status-encerrada'}">
                        ${os.status}
                    </span>
                </td>
                <td class="text-right pr-4">
                    <div class="flex items-center justify-end gap-3">
                        
                        ${os.status === 'ABERTA' ? `
                            <button onclick="solicitarAutorizacao('${os.id}', 'ENCERRAR')" 
                                    class="flex items-center gap-2 bg-emerald-600/10 hover:bg-emerald-600 text-emerald-500 hover:text-white px-3 py-1.5 rounded-lg border border-emerald-500/20 transition-all group">
                                <i class="fa-solid fa-lock text-[10px]"></i>
                                <span class="text-[9px] font-black uppercase">Encerrar OS</span>
                            </button>
                        ` : `
                            <button onclick="solicitarAutorizacao('${os.id}', 'REABRIR')" 
                                    class="flex items-center gap-2 bg-amber-600/10 hover:bg-amber-600 text-amber-500 hover:text-white px-3 py-1.5 rounded-lg border border-amber-500/20 transition-all">
                                <i class="fa-solid fa-lock-open text-[10px]"></i>
                                <span class="text-[9px] font-black uppercase">Reabrir OS</span>
                            </button>
                        `}

                        <div class="flex gap-2 border-l border-slate-800 pl-3">
                            <button onclick="editarOS('${os.id}', '${os.numero_os}')" 
                                    class="text-slate-500 hover:text-white transition-colors p-1" title="Editar Número">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            
                            <button onclick="excluirOS('${os.id}')" 
                                    class="text-red-500/30 hover:text-red-500 transition-colors p-1" title="Excluir OS">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>

                        <a href="Rastreio_Full.html?os=${os.numero_os}" 
                           class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded-lg text-[9px] font-black uppercase shadow-lg shadow-indigo-600/20 transition-all flex items-center gap-2">
                            <span>Acessar</span>
                            <i class="fa-solid fa-arrow-right text-[8px]"></i>
                        </a>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}

async function processarOS() {
    const num = document.getElementById('num_os_input').value;
    const id = document.getElementById('editId').value;
    
    if(!num) {
        alert("Por favor, digite o número da OS.");
        return;
    }

    if(!id) { // Inserir nova
        const meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
        const mesAtual = meses[new Date().getMonth()];
        
        const { error } = await _supabase
            .from('ordens_servico')
            .insert([{ numero_os: num, mes_referencia: mesAtual, status: 'ABERTA' }]);
            
        if(error) alert("Erro ao salvar: " + error.message);
    } else { // Atualizar existente
        const { error } = await _supabase
            .from('ordens_servico')
            .update({ numero_os: num })
            .eq('id', id);
            
        if(error) alert("Erro ao atualizar: " + error.message);
    }
    
    fecharModalOS();
    carregarOS();
}

// Funções de Interface (Atenção ao Case-Sensitive)
function abrirModalOS() { 
    document.getElementById('editId').value = '';
    document.getElementById('num_os_input').value = '';
    document.getElementById('modalTitle').innerText = "Iniciar Nova OS";
    document.getElementById('modalOS').classList.remove('hidden');
    document.getElementById('modalOS').classList.add('flex');
}

function editarOS(id, num) {
    document.getElementById('editId').value = id;
    document.getElementById('num_os_input').value = num;
    document.getElementById('modalTitle').innerText = "Editar Número da OS";
    document.getElementById('modalOS').classList.remove('hidden');
    document.getElementById('modalOS').classList.add('flex');
}

function fecharModalOS() { 
    document.getElementById('modalOS').classList.add('hidden');
    document.getElementById('modalOS').classList.remove('flex');
}



let acaoPendente = null; // Guarda qual OS e qual ação estamos fazendo
const SENHA_MESTRA = "1234"; // Defina sua senha de admin aqui

// Função para disparar o pedido de senha
function solicitarAutorizacao(id, tipo) {
    acaoPendente = { id, tipo };
    document.getElementById('tituloSeguranca').innerText = tipo === 'ENCERRAR' ? 'Encerrar Ordem' : 'Reabrir Ordem';
    document.getElementById('senha_admin').value = '';
    document.getElementById('modalSeguranca').classList.replace('hidden', 'flex');
}

function fecharModalSeguranca() {
    document.getElementById('modalSeguranca').classList.replace('flex', 'hidden');
    acaoPendente = null;
}

async function validarAcaoSeguranca() {
    const senha = document.getElementById('senha_admin').value;
    
    if (senha !== SENHA_MESTRA) {
        alert("SENHA INCORRETA! ACESSO NEGADO.");
        return;
    }

    if (acaoPendente.tipo === 'ENCERRAR') {
        await executarEncerramento(acaoPendente.id);
    } else if (acaoPendente.tipo === 'REABRIR') {
        await executarReabertura(acaoPendente.id);
    }
    
    fecharModalSeguranca();
}

// Funções que realmente falam com o Banco de Dados
async function executarEncerramento(id) {
    const { error } = await _supabase
        .from('ordens_servico')
        .update({ status: 'ENCERRADA', data_encerramento: new Date().toISOString() })
        .eq('id', id);
    if(error) alert(error.message);
    carregarOS();
}

async function executarReabertura(id) {
    const { error } = await _supabase
        .from('ordens_servico')
        .update({ status: 'ABERTA', data_encerramento: null })
        .eq('id', id);
    if(error) alert(error.message);
    carregarOS();
}


function filtrarTabela() {
    const busca = document.getElementById('filtroBusca').value.toUpperCase();
    const statusFiltro = document.getElementById('filtroStatus').value;
    const linhas = document.querySelectorAll('#osList tr');

    linhas.forEach(linha => {
        // Ignora a linha de "Nenhuma OS encontrada" se ela existir
        if (linha.cells.length < 5) return;

        const textoOS = linha.cells[0].textContent.toUpperCase();
        const textoStatus = linha.cells[4].textContent.trim().toUpperCase();

        // Lógica de correspondência
        const correspondeBusca = textoOS.includes(busca);
        const correspondeStatus = (statusFiltro === 'TODOS') || (textoStatus === statusFiltro);

        if (correspondeBusca && correspondeStatus) {
            linha.style.display = "";
        } else {
            linha.style.display = "none";
        }
    });
}
// Inicialização automática
document.addEventListener('DOMContentLoaded', carregarOS);
    </script>
  </body>
</html>
